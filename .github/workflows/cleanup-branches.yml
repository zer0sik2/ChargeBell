name: Cleanup merged branches

on:
  push:
    paths:
      - '.github/workflows/cleanup-branches.yml'

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Delete every remote branch except main
        shell: bash
        run: |
          mapfile -t branches < <(git ls-remote --heads origin | awk '{sub("refs/heads/", "", $2); print $2}')
          for branch in "${branches[@]}"; do
            if [[ "$branch" != "main" ]]; then
              echo "Deleting $branch"
              git push origin --delete "$branch"
            fi
          done
